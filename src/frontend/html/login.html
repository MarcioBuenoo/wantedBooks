                <p class="rodape__logo__texto">Desenvolvido por Márcio Bueno</p>
            </div>
            <div class="rodape__links">
                <a href="">
                    <img src="../../assets/github.svg" alt="Github">
                    Github
                </a>
                <a href="">
                    <img src="../../assets/instagram.svg" alt="Instagram">
                    Instagram
                </a>
                <a href="">
                    <img src="" alt="">
                </a>
            </div>
        </div>

</html>
