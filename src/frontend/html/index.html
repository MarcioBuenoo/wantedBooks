<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wantedBooks</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <nav class="cabecalho">
        <a class="cabecalho__titulo" href="index.html">WantedBooks</a>
        <div class="cabecalho__sidebar">
            <button class="cabecalho__sidebar__button" id="menu-toggle">
                <img src="../../assets/Menu.svg" alt="ícone sidebar">
            </button>
        </div>
    </nav>
    <aside class="sidebar" id="sidebar">
        <button class="sidebar__close" id="menu-close">×</button>
        <ul class="sidebar__menu">
            <li><a href="./index.html">Início</a></li>
            <li><a href="./user.html">Perfil</a></li>
            <li><a href="#">Listas</a></li>
        </ul>
    </aside>

    <main>
        <div class="searchbar">
            <form class="searchbar__form" action="">
                <input class="searchbar__form__input" type="text" placeholder="🔍️ Procurando por algo específico?">
            </form>
        </div>
        <div class="books__showcase">
            <span class="books__showcase__box"></span>
            <span class="books__showcase__box"></span>
            <span class="books__showcase__box"></span>
            <span class="books__showcase__box"></span>
            <span class="books__showcase__box"></span>
        </div>
        <div class="books__showcase__bottom">
            <span class="books__showcase__bottom__box"></span>
            <span class="books__showcase__bottom__box"></span>
            <span class="books__showcase__bottom__box"></span>
            <span class="books__showcase__bottom__box"></span>
            <span class="books__showcase__bottom__box"></span>
        </div>
    </main>
    
    <footer>
        <div class="rodape">
            <div class="rodape__logo">
                <p class="rodape__logo__texto">Desenvolvido por Márcio Bueno</p>
            </div>
            <div class="rodape__links">
                <a href="">
                    <img src="../../assets/github.svg" alt="Github">
                    Github
                </a>
                <a href="">
                    <img src="../../assets/instagram.svg" alt="Instagram">
                    Instagram
                </a>
                <a href="">
                    <img src="" alt="">
                </a>
            </div>
        </div>
    </footer>

    <script src="../js/index.js"></script>
</body>
</html>
